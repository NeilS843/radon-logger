<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radon Logger</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head>

<body>

<h2>Radon Logger (v1.1)</h2>

<button onclick="showPage('add')">Add</button>
<button onclick="showPage('list')">List</button>

<div id="addPage">
  <br>
  <input id="sample" placeholder="Sample Number"><br><br>
  <input id="site" placeholder="Site"><br><br>
  <input type="date" id="date"><br><br>
  <input type="time" id="time"><br><br>
  <input type="date" id="removal"><br><br>

  <input type="file" accept="image/*" capture="environment" id="photo"><br><br>

  <button onclick="getLocation()">Capture GPS</button>
  <p id="gps"></p>

  <button onclick="save()">Save</button>
</div>

<div id="listPage" style="display:none">
  <br>
  <button onclick="exportData()">Export</button>
  <button onclick="shareData()">Share</button>

  <div id="entries"></div>
</div>

<script>
let entries = JSON.parse(localStorage.getItem("entries") || "[]");

function showPage(p){
  document.getElementById("addPage").style.display = p==="add"?"block":"none";
  document.getElementById("listPage").style.display = p==="list"?"block":"none";
}

function render(){
  document.getElementById("entries").innerHTML =
    entries.map((e,i)=>`
      <div style="border:1px solid #ccc; padding:10px; margin:5px">
        <b>${e.sample}</b><br>
        ${e.site}<br>
        ${e.date} ${e.time}<br>
        Remove: ${e.removal}<br>
        GPS: ${e.lat}, ${e.lng}<br>
        ${e.photo ? `<img src="${e.photo}" width="100%">` : ""}
        <br><br>
        <button onclick="del(${i})">Delete</button>
      </div>
    `).join("");
}

render();

let lat="", lng="";

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    lat = pos.coords.latitude.toFixed(6);
    lng = pos.coords.longitude.toFixed(6);
    document.getElementById("gps").innerText = lat + ", " + lng;
  });
}

function save(){
  const file = document.getElementById("photo").files[0];
  const reader = new FileReader();

  reader.onload = function(){
    entries.push({
      sample: document.getElementById("sample").value,
      site: document.getElementById("site").value,
      date: document.getElementById("date").value,
      time: document.getElementById("time").value,
      removal: document.getElementById("removal").value,
      lat, lng,
      photo: reader.result
    });

    localStorage.setItem("entries", JSON.stringify(entries));
    render();
  };

  if(file){
    reader.readAsDataURL(file);
  } else {
    reader.onload();
  }
}

function del(i){
  entries.splice(i,1);
  localStorage.setItem("entries", JSON.stringify(entries));
  render();
}

function exportData(){
  const blob = new Blob([JSON.stringify(entries)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "radon-data.json";
  a.click();
}

function shareData(){
  if(navigator.share){
    navigator.share({text: JSON.stringify(entries)});
  }
}
</script>

</body>
</html>
